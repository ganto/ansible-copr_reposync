---
name: CI
'on':
  pull_request:
  push:
    branches:
      - master
  schedule:
    - cron: "42 1 1 * *"
  workflow_dispatch:

defaults:
  run:
    working-directory: 'ganto.copr_reposync'

jobs:

  lint:
    name: Lint
    runs-on: ubuntu-latest

    steps:
      - name: Check out the codebase.
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          path: 'ganto.copr_reposync'
          persist-credentials: false

      - name: Set up Python 3.
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: '3.x'

      - name: Install test dependencies.
        run: pip3 install yamllint ansible-lint mdformat

      - name: Install Ansible collections.
        run: ansible-galaxy install -r molecule/docker/collections.yml

      - name: Lint code.
        run: |
          yamllint .
          ansible-lint .
          mdformat --check *.md

  molecule:
    name: Molecule
    runs-on: ubuntu-latest

    strategy:
      matrix:
        distro:
          - 'rockylinux9'
          - 'fedora41'
          - 'fedora42'

    steps:
      - name: Check out the codebase.
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          path: 'ganto.copr_reposync'
          persist-credentials: false

      - name: Set up Python 3.
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: '3.x'

      - name: Install test dependencies.
        run: pip3 install -r molecule/docker/requirements.txt

      - name: Run Molecule tests.
        run: molecule test -s docker
        env:
          PY_COLORS: '1'
          ANSIBLE_FORCE_COLOR: '1'
          MOLECULE_DISTRO: ${{ matrix.distro }}
